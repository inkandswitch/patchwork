packages:
  - core/*
  - e2e
  - packages/*
  - packages/annotations/**/*
  - packages/providers/**/*
  - packages/subscribables/**/*
  - meta/*
  - sites/*

overrides:
  "@automerge/automerge": "catalog:"
  # TEMPORARY: link: overrides to local automerge-repo checkout for pre-publish
  # Chrome testing. Revert to "catalog:" once published to npm (see ADR-006/014).
  "@automerge/automerge-repo": "link:/home/expede/Desktop/automerge-repo/packages/automerge-repo"
  "@automerge/automerge-repo-keyhive": "catalog:"
  "@automerge/automerge-repo-network-messagechannel": "link:/home/expede/Desktop/automerge-repo/packages/automerge-repo-network-messagechannel"
  "@automerge/automerge-repo-network-websocket": "link:/home/expede/Desktop/automerge-repo/packages/automerge-repo-network-websocket"
  "@automerge/automerge-repo-react-hooks": "link:/home/expede/Desktop/automerge-repo/packages/automerge-repo-react-hooks"
  "@automerge/automerge-repo-solid-primitives": "catalog:"
  "@automerge/automerge-repo-storage-indexeddb": "link:/home/expede/Desktop/automerge-repo/packages/automerge-repo-storage-indexeddb"
  "@automerge/automerge-subduction": "catalog:"
  "@automerge/react": "link:/home/expede/Desktop/automerge-repo/packages/automerge-react"
  "@automerge/vanillajs": "link:/home/expede/Desktop/automerge-repo/packages/automerge-vanillajs"
  "@keyhive/keyhive": "catalog:"

minimumReleaseAgeExclude:
  - '@automerge/*'
  - '@inkandswitch/*'
  - '@chee/*'

catalog:
  "@automerge/automerge": 3.3.0-fragments.2
  "@automerge/automerge-repo": 2.6.0-subduction.41
  "@automerge/automerge-repo-keyhive": 0.3.0-alpha.sub.8b
  "@automerge/automerge-repo-network-messagechannel": 2.6.0-subduction.41
  "@automerge/automerge-repo-network-websocket": 2.6.0-subduction.41
  "@automerge/automerge-repo-react-hooks": 2.6.0-subduction.41
  "@automerge/automerge-repo-solid-primitives": 2.6.0-subduction.41
  "@automerge/automerge-repo-storage-indexeddb": 2.6.0-subduction.41
  "@automerge/automerge-repo-storage-nodefs": 2.6.0-subduction.41
  "@automerge/automerge-subduction": 0.16.0
  "@automerge/react": 2.6.0-subduction.41
  "@automerge/vanillajs": 2.6.0-subduction.41
  "@keyhive/keyhive": 0.1.0-alpha.5
  "@types/react": 18.3.1
  "@types/react-dom": 18.3.1
  react: 18.3.1
  react-dom: 18.3.1

allowBuilds:
  cbor-extract: true
  esbuild: true
