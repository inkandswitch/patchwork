name: pushwork init

on:
  push:
    branches:
      - claude/trigger-ci-pipeline-MRqib

jobs:
  init:
    name: pushwork init tools/tauri/xterm
    runs-on: ubuntu-latest
    steps:
      - name: check out the repository
        uses: actions/checkout@v4

      - name: install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: run pushwork init
        working-directory: tools/tauri/xterm
        run: |
          npx pushwork init .
          ROOT_URL=$(npx pushwork url)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.pushwork = { url: '$ROOT_URL' };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npx pushwork sync
          echo "rootFolderUrl: $ROOT_URL"

      - name: commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/tauri/xterm/
          git commit -m "pushwork init tools/tauri/xterm"
          git push
